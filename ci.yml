name: Run NUnit Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build

    - name: Test
      run: dotnet test
    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
       name: screenshots
       path: "**/bin/**/Screenshots"

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: "**/bin/**/TestResults"
